baseURL = 'https://shinori.netlify.app/'
languageCode = 'zh-cn'
title = 'Physics Learning Notes'
theme = 'PaperMod'

# 代码高亮
[markup]
  [markup.highlight]
    style = 'dracula'
    noClasses = false

# 目录设置
[tableOfContents]
  ordered = false
  startLevel = 2
  endLevel = 4

[params]
  # 全局启用数学公式 (LaTeX)
  math = true

  description = '物理学习笔记 —— 记录思考，分享知识'
  author = 'shinohoshi'

  # 社交链接
  [[params.socialIcons]]
    name = 'GitHub'
    url = 'https://github.com/shinohoshi'

  # 主题切换 (auto/light/dark)
  defaultTheme = 'auto'
  disableThemeToggle = false

  # 显示阅读时间和字数
  ShowReadingTime = true
  ShowWordCount = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true

  # 日期格式
  DateFormat = '2006-01-02'

  # 启用搜索
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  # 首页 - 个人信息卡模式（放在最后以避免 TOML 解析问题）
  [params.profileMode]
    enabled = true
    title = 'shinohoshi'
    subtitle = '物理学习者 —— 记录思考，分享知识'
    imageUrl = 'images/avatar.jpg'
    imageTitle = 'avatar'
    imageWidth = 120
    imageHeight = 120
    [[params.profileMode.buttons]]
      name = '文章'
      url = 'posts/'
    [[params.profileMode.buttons]]
      name = '归档'
      url = 'archives/'
    [[params.profileMode.buttons]]
      name = '标签'
      url = 'tags/'
    [[params.profileMode.buttons]]
      name = '关于'
      url = 'about/'
    [[params.profileMode.buttons]]
      name = 'GitHub'
      url = 'https://github.com/shinohoshi'

# 导航菜单
[[menu.main]]
  name = '归档'
  url = '/archives/'
  weight = 10
[[menu.main]]
  name = '搜索'
  url = '/search/'
  weight = 20
[[menu.main]]
  name = '标签'
  url = '/tags/'
  weight = 30
[[menu.main]]
  name = '关于'
  url = '/about/'
  weight = 40
